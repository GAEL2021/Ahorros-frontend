<!DOCTYPE html>
<html>
<head><title>Logo Preview</title></head>
<body style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#F8F6FB;font-family:sans-serif;gap:40px">
  <h2 style="color:#1A1423">Preview del nuevo branding</h2>
  <div style="display:flex;gap:40px;align-items:center;flex-wrap:wrap;justify-content:center">
    <div style="text-align:center">
      <p style="font-size:13px;color:#8A7E9E;margin-bottom:12px">Favicon (48x48)</p>
      <img src="/favicon.svg" width="80" height="80" style="border-radius:16px;box-shadow:0 4px 20px rgba(139,92,246,0.2)">
    </div>
    <div style="text-align:center">
      <p style="font-size:13px;color:#8A7E9E;margin-bottom:12px">Sidebar / Login</p>
      <div style="display:flex;align-items:center;gap:12px;background:#FAF8FC;padding:16px 24px;border-radius:16px;border:1px solid #E8E0F0">
        <div style="width:36px;height:36px;background:#8B5CF6;border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(139,92,246,0.3)">
          <span style="color:white;font-weight:700;font-size:14px">MA</span>
        </div>
        <div>
          <p style="margin:0;font-weight:600;font-size:13px;color:#1A1423;line-height:1.2">Gestión de</p>
          <p style="margin:0;font-weight:600;font-size:13px;color:#1A1423;line-height:1.2">Presupuestos</p>
        </div>
      </div>
    </div>
  </div>
  <button onclick="alert('✅ Aprobado')" style="padding:12px 32px;background:#8B5CF6;color:white;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(139,92,246,0.3)">✅ Me gusta, aprobado</button>
</body>
</html>
